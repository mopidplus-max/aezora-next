name: Build Signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          KEYSTORE_ENCODED: ${{ secrets.KEYSTORE_ENCODED }}
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
        run: |
          mkdir -p ${{ runner.temp }}
          echo "$KEYSTORE_ENCODED" | base64 -d > $KEYSTORE_PATH

      - name: Build Signed APK
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.2'
          arguments: |
            assembleRelease 
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/keystore.jks 
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} 
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} 
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: AezoraNext-Signed
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90
